[pytest]
testpaths = dev/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add src to Python path
pythonpath = src

# Output settings
addopts = -v --tb=short --strict-markers

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    requires_root: marks tests that require root privileges
    requires_redis: marks tests that require Redis

# Minimum pytest version
minversion = 7.0

# Ignore deprecation warnings from third-party libraries
filterwarnings =
    ignore::DeprecationWarning:scapy.*
    ignore::DeprecationWarning:redis.*
